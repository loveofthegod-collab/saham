name: Update Stock Data

on:
  schedule:
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

jobs:
  update-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js v24
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Fetch Data from Yahoo Finance
        run: |
          node -e "
          const fs = require('fs');
          const tickers = [
            // Semua saham perbankan Indonesia (Sudah lengkap 46 bank + BANK)
            'BBCA','BMRI','BBRI','BBNI','BRIS','BBTN','ARTO','BTPN','BNGA','BDMN',
            'PNBN','MEGA','NISP','BTPS','BJBR','BJTM','BBYB','BANK','BINA','BSIM',
            'AGRO','SDRA','BBKP','BACA','DNAR','NOBU','BABP','BVIC','PNBS','MAYA',
            'MASB','BMAS','BBHI','BGTG','AMAR','AGRS','BKSW','INPC','BBSI','BBMD',
            'BEKS','BSWD','MCOR','LPPS','PANS','VINS',
            
            // 10 saham populer paling ramai transaksi (non‑bank)
            'ASII','TLKM','GOTO','UNTR','INTP','SMGR','KLBF','ICBP','ANTM','EXCL'
          ];

          (async () => {
            let masterData = {};
            let allDates = new Set();

            console.log('Memulai sinkronisasi data 5 tahun untuk ' + tickers.length + ' saham...');

            for (const ticker of tickers) {
              try {
                // Diubah ke range=5y untuk menarik history data selama 5 tahun
                const res = await fetch('https://query1.finance.yahoo.com/v8/finance/chart/' + ticker + '.JK?range=5y&interval=1d');
                if (!res.ok) continue;
                const data = await res.json();
                const result = data.chart?.result?.[0];
                if (!result) continue;

                const timestamps = result.timestamp || [];
                const closes = result.indicators?.quote?.[0]?.close || [];

                for (let i = 0; i < timestamps.length; i++) {
                  if (closes[i] !== null && closes[i] !== undefined) {
                    const dateStr = new Date(timestamps[i] * 1000).toISOString().split('T')[0];
                    allDates.add(dateStr);
                    if (!masterData[dateStr]) masterData[dateStr] = {};
                    masterData[dateStr][ticker] = Math.round(closes[i]);
                  }
                }
                console.log(ticker + ' sukses.');
              } catch (e) {
                console.log('Gagal fetch ' + ticker);
              }
              // Delay dinaikkan sedikit ke 200ms agar aman saat proses penarikan data 5 tahun
              await new Promise(resolve => setTimeout(resolve, 200));
            }

            let sortedDates = Array.from(allDates).sort();
            let lastPrices = {};
            tickers.forEach(t => lastPrices[t] = 0);

            let finalHistory = [];

            sortedDates.forEach(dateStr => {
              let prices = {};
              tickers.forEach(ticker => {
                if (masterData[dateStr] && masterData[dateStr][ticker] !== undefined && masterData[dateStr][ticker] !== null) {
                  prices[ticker] = masterData[dateStr][ticker];
                  lastPrices[ticker] = masterData[dateStr][ticker];
                } else {
                  prices[ticker] = lastPrices[ticker];
                }
              });
              finalHistory.push({ dateStr, prices });
            });

            fs.writeFileSync('data.json', JSON.stringify({ tickers, history: finalHistory }, null, 2));
            console.log('data.json berhasil dibuat dengan histori 5 tahun.');
          })();
          "

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "Automated: Sinkronisasi data 5 tahun untuk bank + 10 saham populer" || exit 0
          git push
